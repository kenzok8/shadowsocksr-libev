name: monthly-maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '25 4 1 * *'

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool automake \
            libssl-dev libpcre3-dev libc-ares-dev libev-dev \
            libsodium-dev libudns-dev

      - name: Build
        run: |
          ./autogen.sh
          ./configure --disable-documentation --enable-system-shared-lib CFLAGS="-fcommon"
          make -j"$(nproc)"

      - name: Audit repository structure
        run: |
          set -euo pipefail
          ! find . -type d \( -name .idea -o -name .vs \) | grep .
          ! find . -type f \( -name '*.o' -o -name '*.obj' -o -name '*.exe' \) | grep .
          test -f auto/config.sub
          test -f auto/config.guess
          test -f libsodium/build-aux/config.sub
          test -f libsodium/build-aux/config.guess
